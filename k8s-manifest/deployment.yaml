apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-app
  namespace: webapps
spec:
  replicas: 2
  selector:
    matchLabels:
      app: my-app
  template:
    metadata:
      labels:
        app: my-app
    spec:
      containers:
        - name: my-app
          image: ${IMG_TAG}
          ports:
            - containerPort: 15000
---
apiVersion: v1
kind: Service
metadata:
  name: my-app-service
  namespace: webapps
spec:
  type: NodePort
  selector:
    app: my-app
  ports:
    - port: 80
      targetPort: 15000
      nodePort: 30080
